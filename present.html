<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CBA 商談ビュー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
<style>
:root{--bg:#FBF6F1;--band:#F8D7CA;--accent:#E89B7E;--ink:#3A2D2A;--sub:#5C4A45;--gold:#B89968;--hair:rgba(184,153,104,.55)}
*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%;overflow:hidden;background:#15100e;color:var(--ink);font-family:"Noto Serif JP",serif}.en,.eyebrow,.num{font-family:"Cormorant Garamond",serif}#app{display:flex;height:100vh}#script{width:38%;min-width:330px;max-width:560px;height:100vh;overflow-y:auto;background:#1a1411;border-right:1px solid rgba(232,221,213,.12);padding-bottom:100px}.sc-top{position:sticky;top:0;z-index:5;background:#0f0b09;padding:16px 22px;border-bottom:1px solid rgba(232,221,213,.12)}.ttl{font-family:"Cormorant Garamond",serif;letter-spacing:.18em;font-size:15px;color:#e8ddd5}.sub{font-size:11px;color:#9a8b80;margin-top:3px}.sc-item{padding:18px 22px;border-bottom:1px solid rgba(232,221,213,.08);cursor:pointer}.sc-item:hover{background:rgba(232,221,213,.04)}.sc-item.active{background:rgba(232,155,126,.12);border-left:3px solid var(--accent);padding-left:19px}.sc-head{display:flex;align-items:center;gap:10px;margin-bottom:9px}.sc-num{font-family:"Cormorant Garamond",serif;font-style:italic;font-size:19px;color:var(--accent)}.sc-sec{font-size:10px;letter-spacing:.2em;color:var(--gold);text-transform:uppercase}.sc-badge{font-size:9px;background:var(--accent);color:#1a1411;padding:2px 7px;border-radius:9px}.sc-stitle{font-size:13px;color:#fff;opacity:.85;margin-bottom:10px;line-height:1.45}.sc-lbl{font-size:9px;letter-spacing:.2em;color:var(--gold);text-transform:uppercase;margin:11px 0 4px}.sc-talk{font-size:13.5px;line-height:1.85;color:#f0e8e1}.sc-cue{font-size:12px;line-height:1.7;color:#c2b1a6;border-left:2px solid var(--accent);padding-left:11px;margin-top:4px}#right{flex:1;display:flex;flex-direction:column;background:#241c1a;height:100vh}#rbar{height:50px;display:flex;align-items:center;justify-content:space-between;padding:0 18px;background:#1a1411;border-bottom:1px solid rgba(232,221,213,.1)}#pos{font-family:"Cormorant Garamond",serif;letter-spacing:.16em;font-size:14px;color:#c2b1a6}.btns{display:flex;gap:8px}button{background:rgba(232,221,213,.1);color:#e8ddd5;border:1px solid rgba(232,221,213,.22);border-radius:16px;padding:6px 15px;font-size:12px;cursor:pointer;font-family:"Noto Serif JP",serif}button:hover{background:rgba(232,221,213,.2)}button.share{background:rgba(232,155,126,.18);border-color:rgba(232,155,126,.55);color:#f8d7ca}button.fs{background:var(--accent);color:#1a1411;border-color:var(--accent);font-weight:500}#rstage{flex:1;display:flex;align-items:center;justify-content:center;padding:22px;min-height:0}#rframe{position:relative;width:100%;aspect-ratio:16/9;max-height:100%;max-width:calc((100vh - 94px)*1.7778);background:var(--bg);overflow:hidden;box-shadow:0 10px 40px rgba(0,0,0,.4);container-type:size}.slide{position:absolute;inset:0;opacity:0;transition:opacity .35s;pointer-events:none}.slide.active{opacity:1;pointer-events:auto}.band{position:absolute;top:0;left:0;right:0;height:13cqh;background:var(--band);display:flex;align-items:center;padding-left:6cqw}.band h2{font-weight:400;font-size:2.5cqw;letter-spacing:.2em}.eyebrow{letter-spacing:.4em;color:var(--gold);text-transform:uppercase;text-align:center}.hair{height:1px;background:var(--gold);margin:0 auto}em{font-style:normal;background:linear-gradient(transparent 62%,var(--band) 62%);padding:0 .12em}.center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:7cqh 9cqw}.center h1{font-weight:400;font-size:3.1cqw;letter-spacing:.16em;line-height:1.9}.center .eyebrow{font-size:1.2cqw;margin-bottom:4cqh}.foot{position:absolute;bottom:7cqh;left:0;right:0;text-align:center;font-size:1.25cqw;letter-spacing:.14em;color:var(--sub)}.lst,.blk,.ct,.rev,.cl{position:absolute;top:26cqh;left:10cqw;right:10cqw}.row{display:flex;align-items:flex-start;margin-bottom:2.5cqh}.n{flex:0 0 5cqw;font-family:"Cormorant Garamond",serif;font-style:italic;font-size:2cqw;color:var(--accent)}.t,.v{flex:1;font-size:1.45cqw;letter-spacing:.08em;line-height:1.75}.cards,.pr,.sp{position:absolute;top:31cqh;left:9cqw;right:9cqw;display:flex;gap:3cqw;justify-content:center}.card,.plan,.opt{flex:1;border:1px solid var(--hair);padding:4cqh 2cqw;text-align:center;font-size:1.45cqw;line-height:1.7;display:flex;align-items:center;justify-content:center;min-height:22cqh}.cv-logo{position:absolute;top:4cqh;left:3cqw;width:9cqw;height:9cqw;border-radius:50%;object-fit:cover;z-index:3}.cv-hero{position:absolute;top:4.5cqh;left:50%;transform:translateX(-50%);width:82cqw;height:52cqh;object-fit:cover}.cv-tb{position:absolute;bottom:9cqh;left:0;right:0;text-align:center}.cv-lead{font-size:1.9cqw;letter-spacing:.22em;color:var(--sub);margin-bottom:1.6cqh}.cv-title{font-size:3cqw;letter-spacing:.16em}.tm-meta{position:absolute;top:20cqh;left:9cqw;font-size:1.25cqw;color:var(--sub)}.tm-hl{position:absolute;top:27cqh;left:9cqw;right:9cqw;text-align:center;color:var(--accent);font-size:2.35cqw;letter-spacing:.13em}.tm-q{position:absolute;top:42cqh;left:14cqw;right:14cqw;font-size:1.25cqw;line-height:2;text-align:justify}.tm-q p{margin-bottom:1.2cqh}.k{flex:0 0 23cqw;font-size:1.35cqw}.rv{flex:0 0 20cqw;text-align:right;font-size:1.5cqw;color:var(--accent)}body.fs #script,body.fs #rbar,body.customer #script,body.customer #rbar{display:none}body.fs #right,body.customer #app,body.customer #right{width:100vw;height:100vh}body.fs #rstage,body.customer #rstage{padding:0;width:100vw;height:100vh}body.fs #rframe,body.customer #rframe{aspect-ratio:auto;width:100vw;height:100vh;max-width:none;max-height:none;box-shadow:none}#loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#15100e;color:#e8ddd5;z-index:9;letter-spacing:.12em}body.ready #loading{display:none}@media(max-width:900px){#app{flex-direction:column}#script{width:100%;max-width:none;height:42vh}#right{height:58vh}}
</style>
</head>
<body>
<div id="loading">Loading...</div>
<div id="app"><div id="script"><div class="sc-top"><div class="ttl">PRESENTER SCRIPT</div><div class="sub">台本をクリック → 右の顧客提示画面と別窓が連動します</div></div><div id="sclist"></div></div><div id="right"><div id="rbar"><span id="pos"></span><div class="btns"><button onclick="go(-1)">‹ 前</button><button onclick="go(1)">次 ›</button><button class="share" onclick="openCustomer()">↗ 顧客提示画面を別窓で開く</button><button class="fs" onclick="enterFs()">⛶ この画面を全画面</button></div></div><div id="rstage"><div id="rframe"></div></div></div></div>
<script>
const RAW='https://raw.githubusercontent.com/rancorder/cba/main/slides_data.json?ts=' + Date.now();
let DATA=null,S=[],IMG={},cur=0,slideEls=[],scItems=[],bc=null;
const q=new URLSearchParams(location.search);const IS_CUSTOMER=location.pathname.replace(/\/$/,'').endsWith('/customer')||q.get('view')==='customer';if(IS_CUSTOMER)document.body.classList.add('customer');
const CH='cba-present-sync-v1',KEY='cba-present-current-slide';
function roman(i){return ['i','ii','iii','iv','v','vi','vii','viii'][i]||(i+1)}
function clean(x){return (x||'').replace(/<[^>]+>/g,'')}
function render(s){const d=s.deck||{};switch(s.type){case'cover':return `<img class="cv-logo" src="${IMG[d.logo]||''}"><img class="cv-hero" src="${IMG[d.hero]||''}"><div class="center" style="justify-content:flex-end;padding-bottom:9cqh"><div class="cv-lead">${d.lead||''}</div><div class="cv-title">${d.title||''}</div><div class="foot">${d.sub||''} <span class="en">${d.en||''}</span></div></div>`;case'statement':return `<div class="center"><div class="eyebrow">${d.eyebrow||''}</div><div class="hair" style="width:5cqw;margin-bottom:4cqh"></div><h1>${d.title||''}</h1></div>`;case'agenda':case'reflect':return `<div class="band"><h2>${d.title||''}</h2></div><div class="lst">${(d.items||d.lines||[]).map((t,i)=>`<div class="row"><div class="n">${roman(i)}.</div><div class="t">${t}</div></div>`).join('')}</div><div class="foot">${d.foot||''}</div>`;case'curator':case'diagnostic':return `<div class="center" style="justify-content:flex-start;padding-top:10cqh"><div class="eyebrow">${d.eyebrow||''}</div><h1 style="font-size:2.6cqw;line-height:1.6">${d.title||''}</h1><div style="font-size:1.25cqw;color:var(--sub);margin-top:2cqh">${d.lead||''}</div></div><div class="blk">${(d.reasons||d.questions||[]).map((t,i)=>`<div class="row"><div class="n">${roman(i)}.</div><div class="t">${t}</div></div>`).join('')}</div><div class="foot">${d.close||d.sign||''}</div>`;case'testimonial':return `<div class="band"><h2>${d.title||''}</h2></div><div class="tm-meta">${d.meta||''}</div><div class="tm-hl">${d.headline||''}</div><div class="tm-q">${(d.quote||[]).map(x=>`<p>${x}</p>`).join('')}</div>`;case'service':return `<div class="band"><h2>${d.title||''}</h2></div><div class="ct">${(d.items||[]).map((p,i)=>`<div class="row"><div class="n">${roman(i)}.</div><div><div class="t">${p[0]}</div><div class="v" style="color:var(--sub);font-size:1.15cqw">${p[1]}</div></div></div>`).join('')}</div><div class="foot">${d.foot||''}</div>`;case'cards':return `<div class="band"><h2>${d.title||''}</h2></div><div class="cards">${(d.cards||[]).map(x=>`<div class="card">${x}</div>`).join('')}</div><div class="foot">${d.foot||''}</div>`;case'price':return `<div class="band"><h2>${d.title||''}</h2></div><div class="pr">${(d.plans||[]).map(p=>`<div class="plan" style="display:block"><div style="font-size:1.35cqw;color:var(--sub);margin-bottom:2cqh">${p[0]}</div><div style="font-size:3cqw;color:var(--accent);margin-bottom:1cqh">${p[1]}</div><div style="font-size:1.1cqw;color:var(--sub)">${p[2]}</div></div>`).join('')}</div><div class="foot">${d.note||''}<br>${d.foot||''}</div>`;case'special':return `<div class="band"><h2>${d.title||''}</h2></div><div class="center" style="justify-content:flex-start;padding-top:17cqh"><div style="font-size:1.3cqw;color:var(--sub)">${d.lead||''}</div></div><div class="sp">${(d.options||[]).map(p=>`<div class="opt" style="display:block"><div style="color:var(--accent);font-size:1.5cqw;margin-bottom:2cqh">${p[0]}</div><div>${p[1]}</div><div style="font-size:1.05cqw;color:var(--sub);margin-top:1cqh">${p[2]||''}</div></div>`).join('')}</div>`;case'contract':return `<div class="band"><h2>${d.title||''}</h2></div><div class="ct">${(d.points||[]).map(p=>`<div class="row"><div class="k">${p[0]}</div><div class="v">${p[1]}</div></div>`).join('')}</div>`;case'revenue':return `<div class="band"><h2>${d.title||''}</h2></div><div class="rev">${(d.rows||[]).map(p=>`<div class="row"><div class="k">${p[0]}</div><div class="v">${p[1]}</div><div class="rv">${p[2]}</div></div>`).join('')}</div><div class="foot">${d.foot||''}</div>`;case'closing':return `<div class="center" style="justify-content:flex-start;padding-top:11cqh"><div class="eyebrow">${d.eyebrow||''}</div><h1 style="font-size:2.7cqw;line-height:1.6">${d.title||''}</h1></div><div class="cl">${(d.steps||[]).map((t,i)=>`<div class="row"><div class="n">${roman(i)}.</div><div class="t">${t}</div></div>`).join('')}</div><div class="foot">${d.foot||''}</div>`;default:return `<div class="center"><h1>${s.id}</h1></div>`}}
function publish(i){const m={type:'slide',index:i,ts:Date.now()};try{bc&&bc.postMessage(m)}catch(e){}try{localStorage.setItem(KEY,JSON.stringify(m))}catch(e){}}
function initial(){if(q.has('slide'))return Math.max(0,Math.min(S.length-1,Number(q.get('slide'))||0));try{const m=JSON.parse(localStorage.getItem(KEY)||'{}');if(Number.isFinite(m.index))return Math.max(0,Math.min(S.length-1,m.index))}catch(e){}return 0}
function show(i,opt={}){cur=Math.max(0,Math.min(S.length-1,i));slideEls.forEach((e,k)=>e.classList.toggle('active',k===cur));scItems.forEach((e,k)=>e.classList.toggle('active',k===cur));pos.textContent=String(cur+1).padStart(2,'0')+' / '+String(S.length).padStart(2,'0');if(!IS_CUSTOMER&&opt.scroll!==false&&scItems[cur])scItems[cur].scrollIntoView({block:'center',behavior:'smooth'});if(!IS_CUSTOMER&&opt.broadcast!==false)publish(cur)}
function go(d){show(cur+d)}function enterFs(){document.body.classList.add('fs');document.documentElement.requestFullscreen&&document.documentElement.requestFullscreen().catch(()=>{})}function openCustomer(){const u=new URL('/present',location.origin);u.searchParams.set('view','customer');u.searchParams.set('slide',cur);const w=open(u,'cba_customer_display','popup=yes,width=1280,height=720');w&&w.focus();setTimeout(()=>publish(cur),300);setTimeout(()=>publish(cur),1000)}
addEventListener('storage',e=>{if(!IS_CUSTOMER||e.key!==KEY||!e.newValue)return;try{const m=JSON.parse(e.newValue);if(m.type==='slide')show(Number(m.index)||0,{broadcast:false,scroll:false})}catch(err){}});try{bc=new BroadcastChannel(CH);bc.onmessage=e=>{const m=e.data||{};if(IS_CUSTOMER&&m.type==='slide')show(Number(m.index)||0,{broadcast:false,scroll:false})}}catch(e){}
addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='PageDown'||e.key===' '){go(1);e.preventDefault()}if(e.key==='ArrowLeft'||e.key==='PageUp')go(-1);if(e.key==='Home')show(0);if(e.key==='End')show(S.length-1)});
fetch(RAW).then(r=>r.json()).then(d=>{DATA=d;S=d.slides;IMG=d.images||{};rframe.innerHTML=S.map((s,i)=>`<div class="slide" data-i="${i}">${render(s)}</div>`).join('');slideEls=[...rframe.querySelectorAll('.slide')];sclist.innerHTML=S.map((s,i)=>{const n=s.notes||{},badge=s.badge?`<span class="sc-badge">${s.badge}</span>`:'';return `<div class="sc-item" onclick="show(${i})"><div class="sc-head"><span class="sc-num">${String(i+1).padStart(2,'0')}</span><span class="sc-sec">${s.section||''}</span>${badge}</div><div class="sc-stitle">${clean(s.deck?.title||s.deck?.headline||s.deck?.eyebrow||s.id)}</div>${n.talk?`<div class="sc-lbl">話す内容</div><div class="sc-talk">${n.talk}</div>`:''}${n.cue?`<div class="sc-lbl">進行のポイント</div><div class="sc-cue">${n.cue}</div>`:''}</div>`}).join('');scItems=[...sclist.querySelectorAll('.sc-item')];document.body.classList.add('ready');show(initial(),{broadcast:false,scroll:false});if(!IS_CUSTOMER)setTimeout(()=>publish(cur),500)}).catch(e=>{loading.textContent='読み込みに失敗しました。再読み込みしてください。'});
</script>
</body>
</html>
